<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>نظام إدارة المعمل السني - تسجيل الدخول</title>
    <link rel="stylesheet" href="adminStyle.css">
</head>
<body>
    <div class="auth-container">
        <div class="brand">
            <div class="brand-icon">🏭</div>
            <h1>نظام إدارة المعمل السني</h1>
            <p>إدارة متكاملة للحالات والتواصل</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">🔐 تسجيل الدخول</button>
                <button class="tab-btn" data-tab="signup">📝 إنشاء حساب إداري</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <div class="input-group">
                    <label>📧 البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" class="input-field" placeholder="admin@lab.com">
                </div>
                <div class="input-group">
                    <label>🔒 كلمة المرور</label>
                    <input type="password" id="loginPassword" class="input-field" placeholder="********">
                </div>
                <div id="loginError" class="error-msg" style="display: none;"></div>
                <button id="doLoginBtn" class="auth-btn">🚀 دخول</button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form hidden">
                <div class="input-group">
                    <label>👤 اسم المستخدم الإداري</label>
                    <input type="text" id="adminName" class="input-field" placeholder="أدخل الاسم">
                </div>
                <div class="input-group">
                    <label>🏢 اسم المعمل</label>
                    <input type="text" id="labName" class="input-field" placeholder="اسم المعمل">
                </div>
                <div class="input-group">
                    <label>📞 رقم الهاتف</label>
                    <input type="text" id="adminPhone" class="input-field" placeholder="رقم التواصل">
                </div>
                <div class="input-group">
                    <label>📧 البريد الإلكتروني</label>
                    <input type="email" id="adminEmail" class="input-field" placeholder="admin@example.com">
                </div>
                <div class="input-group">
                    <label>🔒 كلمة المرور</label>
                    <input type="password" id="adminPassword" class="input-field" placeholder="********">
                </div>
                <div class="input-group">
                    <label>🔒 تأكيد كلمة المرور</label>
                    <input type="password" id="confirmPassword" class="input-field" placeholder="********">
                </div>
                <div class="input-group">
                    <label>🏛️ المحافظة</label>
                    <input type="text" id="governorate" class="input-field" placeholder="المحافظة">
                </div>
                <div class="input-group">
                    <label>📍 المنطقة</label>
                    <input type="text" id="area" class="input-field" placeholder="المنطقة">
                </div>
                <div id="signupError" class="error-msg" style="display: none;"></div>
                <button id="doSignupBtn" class="auth-btn">✨ إنشاء الحساب</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="adminAuth.js"></script>
</body>
</html>
